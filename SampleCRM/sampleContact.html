<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dummy CRM + Genesys Widget</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
}

/* CRM AREA */
#crm {
    flex:1;
    padding:20px;
    background:#f4f6f8;
}

/* GENESYS PANEL */
#genesysPanel {
    width:400px;
    background:#1f2933;
    color:white;
    position:relative;
    transition:width 0.3s ease;
    display:flex;
    flex-direction:column;
}

/* COLLAPSED */
#genesysPanel.collapsed {
    width:40px;
}

/* TOGGLE BUTTON */
#toggleBtn {
    position:absolute;
    left:-20px;
    top:20px;
    width:20px;
    height:40px;
    background:#1f2933;
    color:white;
    border-radius:5px 0 0 5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

/* IFRAME */
#genesysFrame {
    border:none;
    width:100%;
    height:100%;
}

/* Hide iframe when collapsed */
.collapsed iframe {
    display:none;
}

/* CRM fake styling */
.card {
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- CRM -->
<div id="crm">

    <h2>CRM Demo</h2>

    <div class="card">
        <h3>Cliente</h3>
        <p>Nombre: Juan Pérez</p>
        <p>Contrato: 12345678</p>
        <p>Estado: Activo</p>
    </div>

    <div class="card">
        <h3>Últimas Interacciones</h3>
        <ul>
            <li>Llamada entrante - 10:32</li>
            <li>Email recibido - Ayer</li>
            <li>Alarma conectada</li>
        </ul>
    </div>

    <div class="card">
        <h3>Notas</h3>
        <textarea style="width:100%;height:120px;"></textarea>
    </div>

</div>

<!-- GENESYS SIDE PANEL -->
<div id="genesysPanel">

    <div id="toggleBtn">◀</div>

    <!-- REPLACE URL BELOW -->
    <iframe
        id="genesysFrame"
        src="https://apps.mypurecloud.com/crm/index.html">
    </iframe>

</div>

<script>

const panel = document.getElementById("genesysPanel");
const btn = document.getElementById("toggleBtn");

btn.onclick = () => {
    panel.classList.toggle("collapsed");

    btn.innerHTML =
        panel.classList.contains("collapsed")
        ? "▶"
        : "◀";
};

</script>

</body>
</html>
