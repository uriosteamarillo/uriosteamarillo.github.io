<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Genesys WebSocket Assistant</title>

  <!-- ========================================= -->
  <!-- FONT -->
  <!-- ========================================= -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <!-- ========================================= -->
  <!-- STYLES -->
  <!-- ========================================= -->

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      background: #0f172a;

      font-family: 'Inter', sans-serif;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      color: white;
    }

    .chat-wrapper {

      width: 100%;

      max-width: 950px;

      height: 92vh;

      background: #111827;

      border-radius: 24px;

      overflow: hidden;

      display: flex;

      flex-direction: column;

      box-shadow:
        0 20px 50px rgba(0,0,0,0.35);
    }

    .header {

      padding: 22px 28px;

      border-bottom: 1px solid rgba(255,255,255,0.08);

      background: rgba(255,255,255,0.03);

      backdrop-filter: blur(12px);

      display: flex;

      align-items: center;

      justify-content: space-between;
    }

    .header-title {

      font-size: 18px;

      font-weight: 600;
    }

    .header-buttons {

      display: flex;

      gap: 10px;
    }

    .header-btn {

      border: none;

      color: white;

      padding: 10px 14px;

      border-radius: 12px;

      cursor: pointer;

      font-size: 13px;

      transition: 0.2s ease;
    }

    .connect-btn {

      background: #059669;
    }

    .connect-btn:hover {

      background: #047857;
    }

    .clear-btn {

      background: #dc2626;
    }

    .clear-btn:hover {

      background: #b91c1c;
    }

    .messages {

      flex: 1;

      overflow-y: auto;

      padding: 30px;

      display: flex;

      flex-direction: column;

      gap: 18px;
    }

    .message-row {

      display: flex;
    }

    .message-row.user {

      justify-content: flex-end;
    }

    .message-row.agent {

      justify-content: flex-start;
    }

    .bubble {

      max-width: 75%;

      padding: 16px 18px;

      border-radius: 20px;

      line-height: 1.6;

      font-size: 15px;

      white-space: pre-wrap;

      animation: fadeIn 0.2s ease;
    }

    .user .bubble {

      background: #2563eb;

      color: white;

      border-bottom-right-radius: 8px;
    }

    .agent .bubble {

      background: #1f2937;

      color: #f9fafb;

      border-bottom-left-radius: 8px;
    }

    .typing {

      display: none;

      padding: 0 30px 15px;

      color: #9ca3af;

      font-size: 14px;
    }

    .input-container {

      padding: 20px;

      border-top: 1px solid rgba(255,255,255,0.08);

      background: #111827;
    }

    .input-box {

      display: flex;

      align-items: flex-end;

      gap: 12px;

      background: #1f2937;

      border-radius: 20px;

      padding: 12px 14px;
    }

    textarea {

      flex: 1;

      background: transparent;

      border: none;

      outline: none;

      resize: none;

      color: white;

      font-size: 15px;

      max-height: 140px;

      font-family: inherit;

      line-height: 1.5;
    }

    textarea::placeholder {

      color: #9ca3af;
    }

    .send-btn {

      width: 44px;

      height: 44px;

      border: none;

      border-radius: 14px;

      background: #2563eb;

      color: white;

      font-size: 18px;

      cursor: pointer;

      transition: all 0.2s ease;
    }

    .send-btn:hover {

      background: #1d4ed8;

      transform: scale(1.05);
    }

    .status {

      padding: 10px 30px;

      font-size: 13px;

      color: #9ca3af;

      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .online {

      color: #10b981;
    }

    .offline {

      color: #ef4444;
    }

    .streaming-cursor::after {

      content: "▋";

      animation: blink 0.7s infinite;
    }

    @keyframes blink {

      50% {
        opacity: 0;
      }
    }

    @keyframes fadeIn {

      from {

        opacity: 0;

        transform: translateY(6px);
      }

      to {

        opacity: 1;

        transform: translateY(0);
      }
    }

  </style>

</head>

<body>

<div class="chat-wrapper">

  <!-- ========================================= -->
  <!-- HEADER -->
  <!-- ========================================= -->

  <div class="header">

    <div class="header-title">
      Genesys WebSocket Assistant
    </div>

    <div class="header-buttons">

      <button
        class="header-btn connect-btn"
        onclick="connectWebSocket()"
      >
        Connect
      </button>

      <button
        class="header-btn clear-btn"
        onclick="clearSession()"
      >
        Clear Session
      </button>

    </div>

  </div>

  <!-- ========================================= -->
  <!-- STATUS -->
  <!-- ========================================= -->

  <div
    id="status"
    class="status offline"
  >
    Disconnected
  </div>

  <!-- ========================================= -->
  <!-- MESSAGES -->
  <!-- ========================================= -->

  <div
    id="messages"
    class="messages"
  ></div>

  <!-- ========================================= -->
  <!-- TYPING -->
  <!-- ========================================= -->

  <div
    id="typing"
    class="typing"
  >
    AI is typing...
  </div>

  <!-- ========================================= -->
  <!-- INPUT -->
  <!-- ========================================= -->

  <div class="input-container">

    <div class="input-box">

      <textarea
        id="messageInput"
        rows="1"
        placeholder="Message Genesys AI..."
      ></textarea>

      <button
        class="send-btn"
        onclick="sendMessage()"
      >
        ↑
      </button>

    </div>

  </div>

</div>

<script>

  // =========================================
  // CONFIG
  // =========================================

  const deploymentId =
    "9f1b1ed2-677b-4f2c-8451-d701581477a5";

  // =========================================
  // GLOBAL STATE
  // =========================================

  let socket = null;

  let connected = false;

  // =========================================
  // CONNECT WEBSOCKET
  // =========================================

  async function connectWebSocket() {

    try {

      setStatus(
        "Connecting...",
        false
      );

      // =====================================
      // CREATE SESSION
      // =====================================

      const response = await fetch(
        `https://api.usw2.pure.cloud/api/v2/webmessaging/guest/conversations`,
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            deploymentId: deploymentId
          })
        }
      );

      const session = await response.json();

      console.log(
        "Session:",
        session
      );

      // =====================================
      // OPEN SOCKET
      // =====================================

      socket = new WebSocket(
        session.eventStreamUri
      );

      // =====================================
      // SOCKET OPEN
      // =====================================

      socket.onopen = () => {

        connected = true;

        setStatus(
          "Connected",
          true
        );

        addMessage(
`🚀 Welcome to the Support Assistant

Hola Gabriel 👋

Tu sesión WebSocket fue iniciada correctamente.

## 📌 Summary

• Environment: PROD
• Region: us-east-1
• Status: Operational
• Queue Health: 🟢 Healthy

---

## 🔗 Useful Links

• Portal:
https://example.com

• Documentation:
https://developer.genesys.cloud/

• API Status:
https://status.example.com`,
          "agent",
          true
        );

        console.log(
          "WebSocket connected"
        );
      };

      // =====================================
      // RECEIVE EVENTS
      // =====================================

      socket.onmessage = async (event) => {

        const data =
          JSON.parse(event.data);

        console.log(
          "Socket Event:",
          data
        );

        // ===================================
        // MESSAGE RECEIVED
        // ===================================

        if (
          data.type === "message"
        ) {

          hideTyping();

          if (data.text) {

            addMessage(
              data.text,
              "agent",
              true
            );
          }
        }

        // ===================================
        // STRUCTURED MESSAGE
        // ===================================

        if (
          data.type === "structured"
        ) {

          hideTyping();

          addMessage(
            JSON.stringify(
              data,
              null,
              2
            ),
            "agent",
            true
          );
        }
      };

      // =====================================
      // SOCKET CLOSED
      // =====================================

      socket.onclose = () => {

        connected = false;

        setStatus(
          "Disconnected",
          false
        );

        console.log(
          "WebSocket closed"
        );
      };

      // =====================================
      // SOCKET ERROR
      // =====================================

      socket.onerror = (err) => {

        console.error(
          "Socket error",
          err
        );

        setStatus(
          "Connection Error",
          false
        );
      };

    } catch (err) {

      console.error(
        "Connection failed",
        err
      );

      setStatus(
        "Connection Failed",
        false
      );
    }
  }

  // =========================================
  // SEND MESSAGE
  // =========================================

  async function sendMessage() {

    const input =
      document.getElementById(
        "messageInput"
      );

    const text =
      input.value.trim();

    if (!text) return;

    if (!socket || !connected) {

      addMessage(
        "WebSocket is disconnected.",
        "agent"
      );

      return;
    }

    // =====================================
    // SHOW USER MESSAGE
    // =====================================

    addMessage(
      text,
      "user"
    );

    showTyping();

    input.value = "";

    autoResize(input);

    // =====================================
    // SEND TO SOCKET
    // =====================================

    const payload = {

      action: "onMessage",

      message: {

        type: "Text",

        text: text
      }
    };

    console.log(
      "Sending:",
      payload
    );

    socket.send(
      JSON.stringify(payload)
    );
  }

  // =========================================
  // ADD MESSAGE
  // =========================================

  async function addMessage(
    text,
    sender,
    streaming = false
  ) {

    const messages =
      document.getElementById(
        "messages"
      );

    const row =
      document.createElement("div");

    row.className =
      `message-row ${sender}`;

    const bubble =
      document.createElement("div");

    bubble.className =
      "bubble";

    row.appendChild(bubble);

    messages.appendChild(row);

    messages.scrollTop =
      messages.scrollHeight;

    // =====================================
    // NORMAL MESSAGE
    // =====================================

    if (!streaming) {

      bubble.innerText = text;

      return;
    }

    // =====================================
    // STREAMING EFFECT
    // =====================================

    bubble.classList.add(
      "streaming-cursor"
    );

    let current = "";

    for (
      let i = 0;
      i < text.length;
      i++
    ) {

      current += text[i];

      bubble.innerText =
        current;

      messages.scrollTop =
        messages.scrollHeight;

      await new Promise(r =>
        setTimeout(r, 8)
      );
    }

    bubble.classList.remove(
      "streaming-cursor"
    );
  }

  // =========================================
  // STATUS
  // =========================================

  function setStatus(
    text,
    online
  ) {

    const status =
      document.getElementById(
        "status"
      );

    status.innerText = text;

    status.className =
      online
        ? "status online"
        : "status offline";
  }

  // =========================================
  // TYPING
  // =========================================

  function showTyping() {

    document.getElementById(
      "typing"
    ).style.display = "block";
  }

  function hideTyping() {

    document.getElementById(
      "typing"
    ).style.display = "none";
  }

  // =========================================
  // CLEAR SESSION
  // =========================================

  async function clearSession() {

    try {

      // ===================================
      // CLOSE SOCKET
      // ===================================

      if (socket) {

        socket.close();
      }

      // ===================================
      // STORAGE
      // ===================================

      localStorage.clear();

      sessionStorage.clear();

      // ===================================
      // COOKIES
      // ===================================

      document.cookie
        .split(";")
        .forEach(cookie => {

          const eqPos =
            cookie.indexOf("=");

          const name =
            eqPos > -1
              ? cookie
                  .substr(0, eqPos)
                  .trim()
              : cookie.trim();

          document.cookie =
            name +
            "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
        });

      // ===================================
      // CLEAR UI
      // ===================================

      document.getElementById(
        "messages"
      ).innerHTML = "";

      setStatus(
        "Disconnected",
        false
      );

      console.log(
        "Session cleared"
      );

    } catch (err) {

      console.error(
        "Clear failed",
        err
      );
    }
  }

  // =========================================
  // AUTO RESIZE
  // =========================================

  const textarea =
    document.getElementById(
      "messageInput"
    );

  textarea.addEventListener(
    "input",
    function () {

      autoResize(this);
    }
  );

  function autoResize(el) {

    el.style.height = "auto";

    el.style.height =
      el.scrollHeight + "px";
  }

  // =========================================
  // ENTER TO SEND
  // =========================================

  textarea.addEventListener(
    "keydown",
    function(e) {

      if (
        e.key === "Enter" &&
        !e.shiftKey
      ) {

        e.preventDefault();

        sendMessage();
      }
    }
  );

</script>

</body>

</html>
