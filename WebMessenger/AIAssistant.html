<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Genesys AI Assistant</title>

  <!-- ========================================= -->
  <!-- GENESYS -->
  <!-- ========================================= -->

  <script type="text/javascript" charset="utf-8">

    (function (g, e, n, es, ys) {

      g['_genesysJs'] = e;

      g[e] = g[e] || function () {

        (g[e].q = g[e].q || []).push(arguments)
      };

      g[e].t = 1 * new Date();

      g[e].c = es;

      ys = document.createElement('script');

      ys.async = 1;

      ys.src = n;

      document.head.appendChild(ys);

    })(

        deploymentId: '9f1b1ed2-677b-4f2c-8451-d701581477a5'

    );

  </script>

  <!-- ========================================= -->
  <!-- FONT -->
  <!-- ========================================= -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <!-- ========================================= -->
  <!-- STYLES -->
  <!-- ========================================= -->

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      background: #0f172a;

      font-family: 'Inter', sans-serif;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      color: white;
    }

    .chat-wrapper {

      width: 100%;

      max-width: 950px;

      height: 92vh;

      background: #111827;

      border-radius: 24px;

      overflow: hidden;

      display: flex;

      flex-direction: column;

      box-shadow:
        0 20px 50px rgba(0,0,0,0.35);
    }

  .header {

  padding: 22px 28px;

  border-bottom: 1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.03);

  backdrop-filter: blur(12px);

  display: flex;

  align-items: center;

  justify-content: space-between;
}

.header-title {

  font-size: 18px;

  font-weight: 600;
}

.clear-btn {

  border: none;

  background: #dc2626;

  color: white;

  padding: 10px 14px;

  border-radius: 12px;

  cursor: pointer;

  font-size: 13px;

  transition: 0.2s ease;
}

.clear-btn:hover {

  background: #b91c1c;

  transform: scale(1.04);
}

    .messages {

      flex: 1;

      overflow-y: auto;

      padding: 30px;

      display: flex;

      flex-direction: column;

      gap: 18px;
    }

    .message-row {

      display: flex;
    }

    .message-row.user {

      justify-content: flex-end;
    }

    .message-row.agent {

      justify-content: flex-start;
    }

    .bubble {

      max-width: 75%;

      padding: 14px 18px;

      border-radius: 20px;

      line-height: 1.5;

      font-size: 15px;

      white-space: pre-wrap;

      animation: fadeIn 0.2s ease;
    }

    .user .bubble {

      background: #2563eb;

      color: white;

      border-bottom-right-radius: 8px;
    }

    .agent .bubble {

      background: #1f2937;

      color: #f9fafb;

      border-bottom-left-radius: 8px;
    }

    .typing {

      display: none;

      padding: 0 30px 15px;

      color: #9ca3af;

      font-size: 14px;
    }

    .input-container {

      padding: 20px;

      border-top: 1px solid rgba(255,255,255,0.08);

      background: #111827;
    }

    .input-box {

      display: flex;

      align-items: flex-end;

      gap: 12px;

      background: #1f2937;

      border-radius: 20px;

      padding: 12px 14px;
    }

    textarea {

      flex: 1;

      background: transparent;

      border: none;

      outline: none;

      resize: none;

      color: white;

      font-size: 15px;

      max-height: 140px;

      font-family: inherit;

      line-height: 1.5;
    }

    textarea::placeholder {

      color: #9ca3af;
    }

    .send-btn {

      width: 44px;

      height: 44px;

      border: none;

      border-radius: 14px;

      background: #2563eb;

      color: white;

      font-size: 18px;

      cursor: pointer;

      transition: all 0.2s ease;
    }

    .send-btn:hover {

      background: #1d4ed8;

      transform: scale(1.05);
    }

    ::-webkit-scrollbar {

      width: 8px;
    }

    ::-webkit-scrollbar-thumb {

      background: rgba(255,255,255,0.12);

      border-radius: 999px;
    }

    @keyframes fadeIn {

      from {

        opacity: 0;

        transform: translateY(6px);
      }

      to {

        opacity: 1;

        transform: translateY(0);
      }
    }
    .streaming-cursor::after {

  content: "▋";

  animation: blink 0.7s infinite;
}

@keyframes blink {

  50% {
    opacity: 0;
  }
}

  </style>

</head>

<body>

<div class="chat-wrapper">

 <div class="header">

  <div class="header-title">
    Genesys AI Assistant
  </div>

  <button class="clear-btn" onclick="clearGenesysSession()">
    Clear Session
  </button>

</div>

  <div id="messages" class="messages"></div>

  <div id="typing" class="typing">
    AI is typing...
  </div>

  <div class="input-container">

    <div class="input-box">

      <textarea
        id="messageInput"
        rows="1"
        placeholder="Message Genesys AI..."
      ></textarea>

      <button class="send-btn" onclick="sendMessage()">
        ↑
      </button>

    </div>

  </div>

</div>

<script>

  // =========================================
  // WAIT FOR SDK
  // =========================================

  async function waitForGenesys() {

    return new Promise((resolve) => {

      const interval = setInterval(() => {

        if (window.Genesys) {

          clearInterval(interval);

          console.log("Genesys SDK Loaded");

          resolve();
        }

      }, 100);

    });
  }

  // =========================================
  // GLOBAL STATE
  // =========================================

  let conversationActive = false;

  let startingConversation = false;

  // =========================================
  // INIT
  // =========================================

  async function initApp() {

    await waitForGenesys();

    registerSubscriptions();

    await startConversation();
  }

  // =========================================
  // REGISTER EVENTS
  // =========================================

  function registerSubscriptions() {

    // =====================================
    // READY
    // =====================================

    Genesys(
      "subscribe",
      "MessagingService.ready",
      function () {

        console.log("Messaging Ready");
      }
    );

    // =====================================
    // RECEIVE MESSAGES
    // =====================================

    Genesys(
      "subscribe",
      "MessagingService.messagesReceived",
      function (event) {

        hideTyping();

        console.log("Received:", event);

        conversationActive = true;

        event.data.messages.forEach(msg => {

         console.log("FULL MESSAGE:", msg);

  // =====================================
  // TEXT
  // =====================================

  if (msg.text) {

    addMessage(
      msg.text,
      "agent",
      true
    );
  }

  // =====================================
  // STRUCTURED CONTENT
  // =====================================
if (msg.content) {

  console.log(
    "STRUCTURED CONTENT:",
    msg.content
  );

  renderStructuredContent(
    Array.isArray(msg.content)
      ? msg.content
      : [msg.content]
  );
}

          

});
    });

     

    // =====================================
    // CONVERSATION CLOSED
    // =====================================


    Genesys(
      "subscribe",
      "MessagingService.conversationCleared",
      function () {

        console.log("Conversation cleared");

        conversationActive = false;
      }
    );
  }

  // =========================================
  // START CONVERSATION
  // =========================================

  async function startConversation() {

    if (startingConversation) return;

    startingConversation = true;

    try {

      console.log("Starting conversation...");

      await Genesys(
        "command",
        "MessagingService.startConversation"
      );

      conversationActive = true;

      console.log("Conversation started");

    } catch (err) {

      console.error("Failed to start conversation", err);

      conversationActive = false;

    } finally {

      startingConversation = false;
    }
  }

  // =========================================
  // RESTART CONVERSATION
  // =========================================

  async function restartConversation() {

    console.log("Restarting conversation...");

    conversationActive = false;

    await startConversation();
  }

  // =========================================
  // SEND MESSAGE
  // =========================================

 async function sendMessage() {

  const input = document.getElementById("messageInput");

  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");

  showTyping();

  input.value = "";

  autoResize(input);

  try {

    await Genesys(
      "command",
      "MessagingService.sendMessage",
      {
        message: text
      }
    );

  } catch (err) {

    console.warn(
      "Conversation expired. Restarting...",
      err
    );

    try {

      conversationReady = false;

    try {

  await Genesys(
    "command",
    "MessagingService.clearConversation"
  );

} catch (e) {

  console.warn(
    "clearConversation failed",
    e
  );
}

      Genesys(
        "command",
        "MessagingService.startConversation"
      );

      await waitForConversationReady();

      await Genesys(
        "command",
        "MessagingService.sendMessage",
        {
          message: text
        }
      );

    } catch (retryErr) {

      console.error(
        "Recovery failed",
        retryErr
      );

      hideTyping();

      addMessage(
        "Connection lost. Retry.",
        "agent"
      );
    }
  }
}


function renderStructuredContent(contentArray) {

  const messages =
    document.getElementById("messages");

  contentArray.forEach(item => {

    // =====================================
    // QUICK REPLY
    // =====================================

    if (item.contentType === "QuickReply") {

      const container =
        document.createElement("div");

      container.className =
        "message-row agent";

      const wrapper =
        document.createElement("div");

      wrapper.style.display = "flex";
      wrapper.style.gap = "10px";
      wrapper.style.flexWrap = "wrap";

      const button =
        document.createElement("button");

      button.innerText =
        item.quickReply.text;

      button.style.background =
        "#2563eb";

      button.style.border =
        "none";

      button.style.color =
        "white";

      button.style.padding =
        "10px 16px";

      button.style.borderRadius =
        "999px";

      button.style.cursor =
        "pointer";

      button.onclick = () => {

        sendQuickReply(
          item.quickReply.payload
        );
      };

      wrapper.appendChild(button);

      container.appendChild(wrapper);

      messages.appendChild(container);
    }

   // =====================================
 // CARD
 // =====================================

 if (item.contentType === "Card") {

   console.log(
     "CARD RECEIVED",
     item.card
   );

   // =====================================
   // GET VIDEO URL
   // =====================================

   const action =
     item.card.actions?.[0];

   if (!action?.url) return;

   // =====================================
   // CREATE ROW
   // =====================================

   const container =
     document.createElement("div");

   container.className =
     "message-row agent";

   // =====================================
   // CREATE VIDEO
   // =====================================

   const video =
     document.createElement("video");

   video.src = action.url;

   video.controls = false;

   video.autoplay = true;

   video.muted = false;

   video.playsInline = true;

   video.style.maxWidth = "420px";

   video.style.borderRadius = "18px";

   video.style.background = "#000";

   // =====================================
   // APPEND
   // =====================================

   container.appendChild(video);

   messages.appendChild(container);

   // =====================================
   // FORCE PLAY
   // =====================================

   video.play().catch(err => {

     console.warn(
       "Autoplay blocked",
       err
     );
   });
 }

  }); // FOR EACH

  messages.scrollTop =
    messages.scrollHeight;
}

  // =========================================
  // ADD MESSAGE
  // =========================================

  
  async function addMessage(text, sender, streaming = false) {

  const messages = document.getElementById("messages");

  const row = document.createElement("div");

  row.className = `message-row ${sender}`;

  const bubble = document.createElement("div");

  bubble.className = "bubble";

  row.appendChild(bubble);

  messages.appendChild(row);

  messages.scrollTop = messages.scrollHeight;

  // =====================================
  // NORMAL MESSAGE
  // =====================================

  if (!streaming) {

    bubble.innerText = text;

    return;
  }
 




    
  // =====================================
  // STREAMING EFFECT
  // =====================================

  bubble.classList.add("streaming-cursor");

  let current = "";

  for (let i = 0; i < text.length; i++) {

    current += text[i];

    bubble.innerText = current;

    messages.scrollTop = messages.scrollHeight;

    await new Promise(r => setTimeout(r, 12));
  }

  bubble.classList.remove("streaming-cursor");
}
  // =========================================
  // ENTER TO SEND
  // =========================================

  const textarea = document.getElementById("messageInput");

  textarea.addEventListener("keydown", function(e) {

    if (e.key === "Enter" && !e.shiftKey) {

      e.preventDefault();

      sendMessage();
    }
  });

  // =========================================
  // AUTO RESIZE
  // =========================================

  textarea.addEventListener("input", function () {

    autoResize(this);
  });

  function autoResize(el) {

    el.style.height = "auto";

    el.style.height = el.scrollHeight + "px";
  }



    
  // =========================================
  // TYPING
  // =========================================

  function showTyping() {

    document.getElementById("typing").style.display = "block";
  }

  function hideTyping() {

    document.getElementById("typing").style.display = "none";
  }

async function clearGenesysSession() {

  try {

    try {

      await Genesys(
        "command",
        "MessagingService.clearConversation"
      );

    } catch (e) {

      console.warn(
        "clearConversation failed",
        e
      );
    }

    // =====================================
    // REMOVE LOCAL STORAGE
    // =====================================

    Object.keys(localStorage).forEach(key => {

      if (
        key.toLowerCase().includes("genesys") ||
        key.toLowerCase().includes("purecloud")
      ) {

        localStorage.removeItem(key);
      }
    });

    // =====================================
    // REMOVE SESSION STORAGE
    // =====================================

    Object.keys(sessionStorage).forEach(key => {

      if (
        key.toLowerCase().includes("genesys") ||
        key.toLowerCase().includes("purecloud")
      ) {

        sessionStorage.removeItem(key);
      }
    });

    // =====================================
    // REMOVE COOKIES
    // =====================================

    document.cookie.split(";").forEach(cookie => {

      const eqPos = cookie.indexOf("=");

      const name =
        eqPos > -1
          ? cookie.substr(0, eqPos).trim()
          : cookie.trim();

      document.cookie =
        name +
        "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
    });

    // =====================================
    // CLEAR UI
    // =====================================

    document.getElementById("messages").innerHTML = "";

    console.log("Genesys session cleared");

    location.reload();

  } catch (err) {

    console.error(
      "Failed clearing session",
      err
    );
  }
}

  
  // =========================================
  // START APP
  // =========================================

  initApp();

</script>

</body>

</html>
