<script>

  // =========================================
  // GLOBAL STATE
  // =========================================

  let conversationActive = false;

  let startingConversation = false;

  // =========================================
  // START CONVERSATION
  // =========================================

  async function startConversation() {

    if (startingConversation) return;

    startingConversation = true;

    console.log("Starting conversation...");

    try {

      await Genesys(
        "command",
        "MessagingService.startConversation"
      );

      conversationActive = true;

      console.log("Conversation started");

    } catch (err) {

      console.error("Failed to start conversation", err);

      conversationActive = false;

    } finally {

      startingConversation = false;
    }
  }

  // =========================================
  // INITIAL START
  // =========================================

  startConversation();

  // =========================================
  // RECEIVE MESSAGES
  // =========================================

  Genesys(
    "subscribe",
    "MessagingService.messagesReceived",
    function (event) {

      hideTyping();

      console.log("Received:", event);

      conversationActive = true;

      event.data.messages.forEach(msg => {

        if (!msg.text) return;

        addMessage(msg.text, "agent");
      });
    }
  );

  // =========================================
  // CONVERSATION CLOSED
  // =========================================

  Genesys(
    "subscribe",
    "MessagingService.conversationCleared",
    function () {

      console.log("Conversation cleared");

      conversationActive = false;
    }
  );

  // =========================================
  // SESSION EXPIRED / CLOSED
  // =========================================

  Genesys(
    "subscribe",
    "MessagingService.ready",
    function () {

      console.log("Messaging service ready");
    }
  );

  // =========================================
  // RESTART CONVERSATION
  // =========================================

  async function restartConversation() {

    console.log("Restarting conversation...");

    conversationActive = false;

    await startConversation();
  }

  // =========================================
  // SEND MESSAGE
  // =========================================

  async function sendMessage() {

    const input = document.getElementById("messageInput");

    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");

    showTyping();

    input.value = "";

    autoResize(input);

    try {

      // =====================================
      // VERIFY ACTIVE SESSION
      // =====================================

      if (!conversationActive) {

        console.log("No active conversation. Creating new one...");

        await restartConversation();
      }

      // =====================================
      // SEND MESSAGE
      // =====================================

      await Genesys(
        "command",
        "MessagingService.sendMessage",
        {
          message: text
        }
      );

    } catch (err) {

      console.error("Send failed:", err);

      // =====================================
      // AUTO RECOVER
      // =====================================

      try {

        console.log("Trying automatic recovery...");

        await restartConversation();

        await Genesys(
          "command",
          "MessagingService.sendMessage",
          {
            message: text
          }
        );

      } catch (retryErr) {

        console.error("Recovery failed:", retryErr);

        hideTyping();

        addMessage(
          "Connection lost. Please try again.",
          "agent"
        );
      }
    }
  }

  // =========================================
  // ADD MESSAGE TO UI
  // =========================================

  function addMessage(text, sender) {

    const messages = document.getElementById("messages");

    const row = document.createElement("div");

    row.className = `message-row ${sender}`;

    const bubble = document.createElement("div");

    bubble.className = "bubble";

    bubble.innerText = text;

    row.appendChild(bubble);

    messages.appendChild(row);

    messages.scrollTop = messages.scrollHeight;
  }

  // =========================================
  // ENTER TO SEND
  // =========================================

  const textarea = document.getElementById("messageInput");

  textarea.addEventListener("keydown", function(e) {

    if (e.key === "Enter" && !e.shiftKey) {

      e.preventDefault();

      sendMessage();
    }
  });

  // =========================================
  // AUTO RESIZE
  // =========================================

  textarea.addEventListener("input", function () {

    autoResize(this);
  });

  function autoResize(el) {

    el.style.height = "auto";

    el.style.height = (el.scrollHeight) + "px";
  }

  // =========================================
  // TYPING
  // =========================================

  function showTyping() {

    document.getElementById("typing").style.display = "block";
  }

  function hideTyping() {

    document.getElementById("typing").style.display = "none";
  }

</script>
