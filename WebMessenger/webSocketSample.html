<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Genesys WebSocket Chat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      background: #0f172a;

      font-family: 'Inter', sans-serif;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      color: white;
    }

    .chat-wrapper {

      width: 100%;

      max-width: 950px;

      height: 92vh;

      background: #111827;

      border-radius: 24px;

      overflow: hidden;

      display: flex;

      flex-direction: column;

      box-shadow:
        0 20px 50px rgba(0,0,0,0.35);
    }

    .header {

      padding: 22px 28px;

      border-bottom: 1px solid rgba(255,255,255,0.08);

      font-size: 18px;

      font-weight: 600;

      background: rgba(255,255,255,0.03);

      backdrop-filter: blur(12px);
    }

    .messages {

      flex: 1;

      overflow-y: auto;

      padding: 30px;

      display: flex;

      flex-direction: column;

      gap: 18px;
    }

    .message-row {

      display: flex;
    }

    .message-row.user {

      justify-content: flex-end;
    }

    .message-row.agent {

      justify-content: flex-start;
    }

    .bubble {

      max-width: 75%;

      padding: 14px 18px;

      border-radius: 20px;

      line-height: 1.5;

      font-size: 15px;

      white-space: pre-wrap;

      animation: fadeIn 0.2s ease;
    }

    .user .bubble {

      background: #2563eb;

      color: white;

      border-bottom-right-radius: 8px;
    }

    .agent .bubble {

      background: #1f2937;

      color: #f9fafb;

      border-bottom-left-radius: 8px;
    }

    .typing {

      display: none;

      padding: 0 30px 15px;

      color: #9ca3af;

      font-size: 14px;
    }

    .input-container {

      padding: 20px;

      border-top: 1px solid rgba(255,255,255,0.08);

      background: #111827;
    }

    .input-box {

      display: flex;

      align-items: flex-end;

      gap: 12px;

      background: #1f2937;

      border-radius: 20px;

      padding: 12px 14px;
    }

    textarea {

      flex: 1;

      background: transparent;

      border: none;

      outline: none;

      resize: none;

      color: white;

      font-size: 15px;

      max-height: 140px;

      font-family: inherit;

      line-height: 1.5;
    }

    textarea::placeholder {

      color: #9ca3af;
    }

    .send-btn {

      width: 44px;

      height: 44px;

      border: none;

      border-radius: 14px;

      background: #2563eb;

      color: white;

      font-size: 18px;

      cursor: pointer;

      transition: all 0.2s ease;
    }

    .send-btn:hover {

      background: #1d4ed8;

      transform: scale(1.05);
    }

    .status {

      font-size: 13px;

      color: #9ca3af;

      padding: 10px 30px;
    }

    ::-webkit-scrollbar {

      width: 8px;
    }

    ::-webkit-scrollbar-thumb {

      background: rgba(255,255,255,0.12);

      border-radius: 999px;
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>

</head>

<body>

<div class="chat-wrapper">

  <div class="header">
    Genesys WebSocket API Chat
  </div>

  <div id="status" class="status">
    Connecting...
  </div>

  <div id="messages" class="messages"></div>

  <div id="typing" class="typing">
    AI is typing...
  </div>

  <div class="input-container">

    <div class="input-box">

      <textarea
        id="messageInput"
        rows="1"
        placeholder="Message..."
      ></textarea>

      <button class="send-btn" onclick="sendMessage()">
        ↑
      </button>

    </div>

  </div>

</div>

<script>

  // =========================================
  // CONFIG
  // =========================================

  const deploymentId = "YOUR_DEPLOYMENT_ID";

  const region = "mypurecloud.com";

  let websocket = null;

  let conversationId = null;

  let jwt = null;

  // =========================================
  // CREATE CONVERSATION
  // =========================================

  async function initializeConversation() {

    try {

      // =====================================
      // CREATE GUEST CONVERSATION
      // =====================================

      const response = await fetch(
        `https://api.${region}/api/v2/webmessaging/guest/conversations`,
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            deploymentId: deploymentId
          })
        }
      );

      const data = await response.json();

      console.log("Conversation:", data);

      conversationId = data.id;

      jwt = data.jwt;

      // =====================================
      // CONNECT WEBSOCKET
      // =====================================

      connectWebSocket(data.eventStreamUri);

      updateStatus("Connected");

    } catch (err) {

      console.error(err);

      updateStatus("Connection failed");
    }
  }

  // =========================================
  // CONNECT WEBSOCKET
  // =========================================

  function connectWebSocket(uri) {

    websocket = new WebSocket(uri);

    websocket.onopen = () => {

      console.log("WebSocket connected");
    };

    websocket.onmessage = (event) => {

      const payload = JSON.parse(event.data);

      console.log("WS EVENT:", payload);

      // =====================================
      // MESSAGE RECEIVED
      // =====================================

      if (
        payload.topicName &&
        payload.topicName.includes("message")
      ) {

        const body = payload.eventBody;

        if (
          body &&
          body.body &&
          body.body.text
        ) {

          hideTyping();

          addMessage(body.body.text, "agent");
        }
      }
    };

    websocket.onerror = (err) => {

      console.error("WS Error:", err);

      updateStatus("WebSocket error");
    };

    websocket.onclose = () => {

      updateStatus("Disconnected");
    };
  }

  // =========================================
  // SEND MESSAGE
  // =========================================

  async function sendMessage() {

    const input = document.getElementById("messageInput");

    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");

    showTyping();

    try {

      await fetch(
        `https://api.${region}/api/v2/webmessaging/guest/conversations/${conversationId}/messages`,
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${jwt}`
          },

          body: JSON.stringify({
            text: text
          })
        }
      );

    } catch (err) {

      console.error(err);

      hideTyping();
    }

    input.value = "";

    autoResize(input);
  }

  // =========================================
  // UI HELPERS
  // =========================================

  function addMessage(text, sender) {

    const messages = document.getElementById("messages");

    const row = document.createElement("div");

    row.className = `message-row ${sender}`;

    const bubble = document.createElement("div");

    bubble.className = "bubble";

    bubble.innerText = text;

    row.appendChild(bubble);

    messages.appendChild(row);

    messages.scrollTop = messages.scrollHeight;
  }

  function updateStatus(text) {

    document.getElementById("status").innerText = text;
  }

  function showTyping() {

    document.getElementById("typing").style.display = "block";
  }

  function hideTyping() {

    document.getElementById("typing").style.display = "none";
  }

  // =========================================
  // TEXTAREA
  // =========================================

  const textarea = document.getElementById("messageInput");

  textarea.addEventListener("keydown", function(e) {

    if (e.key === "Enter" && !e.shiftKey) {

      e.preventDefault();

      sendMessage();
    }
  });

  textarea.addEventListener("input", function () {

    autoResize(this);
  });

  function autoResize(el) {

    el.style.height = "auto";

    el.style.height = (el.scrollHeight) + "px";
  }

  // =========================================
  // START
  // =========================================

  initializeConversation();

</script>

</body>
</html>
